<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Novels — ReadAura</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.imgur.com/8WN9Od9.png">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888"
     crossorigin="anonymous"></script>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .book-card {
      transition: transform 0.2s ease;
    }
    .book-card:hover {
      transform: scale(1.03);
      background-color: #fdf7ff;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="p-3 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div id="logo" class="cursor-pointer flex items-center" onclick="goHome()">
        <img id="site-logo" src="https://i.imgur.com/8WN9Od9.png" alt="ReadAura Logo" class="h-10 w-auto rounded">
      </div>
      <button onclick="goHome()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Home
      </button>
      <button onclick="goToAuthorPage()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Become an Author
      </button>
    </div>
    <div class="flex items-center space-x-2">
      <div class="flex items-center bg-gray-100 px-3 py-1 rounded w-48 sm:w-64">
        <i class="fas fa-search text-gray-500 mr-2"></i>
        <input id="search-input" type="text" placeholder="Search novels..." 
          class="bg-transparent outline-none w-full text-sm" oninput="searchNovels()">
      </div>
      <button id="auth-btn" class="bg-purple-600 text-white px-3 py-1 rounded" onclick="toggleAuth()">
        Sign In
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="container mx-auto p-6 mt-6">
    <h1 class="text-2xl font-bold mb-4 text-center">🏆 All‑Time Top Novels</h1>
    <p class="text-gray-500 text-center mb-8">Ranked by total views (all time).</p>

    <!-- Top Novels List -->
    <div id="top-novels-list" class="space-y-4">
      <p class="text-center text-gray-500">Loading top novels...</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white py-6 mt-10">
    <div class="container mx-auto text-center text-sm">
      &copy; 2025 ReadAura. All rights reserved.
    </div>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Config (updated to match your latest API key)
    const firebaseConfig = {
      apiKey: "AIzaSyBIums2N8B9AcAqwbstg1eVOOGsJZXrnPU",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // NAVIGATION
    function goHome() {
      window.location.href = "index.html";
    }
    function goToAuthorPage() {
      window.location.href = "become-an-author.html";
    }

    // LOAD LOGO
    function loadLogo() {
      db.ref("site/logo").on("value", snap => {
        const logoUrl = snap.val();
        const logoImg = document.getElementById("site-logo");
        logoImg.src = logoUrl || "https://i.imgur.com/8WN9Od9.png";
      });
    }

    // LOAD TOP NOVELS BY TOTAL VIEWS
    function loadTopNovels() {
      const list = document.getElementById("top-novels-list");
      db.ref("books").on("value", snap => {
        if (!snap.exists()) {
          list.innerHTML = "<p class='text-center text-gray-500'>No novels found.</p>";
          return;
        }

        let novels = [];
        snap.forEach(bookSnap => {
          const data = bookSnap.val();
          novels.push({
            id: bookSnap.key,
            title: data.title || "Untitled Novel",
            author: data.author || "Unknown Author",
            cover: data.cover || "https://via.placeholder.com/150?text=No+Cover",
            totalViews: data.views || 0     // ← CHANGED: use total 'views'
          });
        });

        // Sort by total views (descending)
        novels.sort((a, b) => b.totalViews - a.totalViews);

        list.innerHTML = "";
        novels.forEach((novel, index) => {
          const rank = index + 1;
          const div = document.createElement("div");
          div.className = "flex items-center bg-white rounded-lg shadow-md p-4 book-card cursor-pointer hover:bg-purple-50 transition";
          div.setAttribute("data-id", novel.id);
          div.onclick = () => openNovel(novel.id);

          div.innerHTML = `
            <div class="text-3xl font-bold text-yellow-500 w-10 text-center">${rank}</div>
            <img src="${novel.cover}" alt="${novel.title}" class="w-20 h-28 object-cover rounded-lg mx-4 border">
            <div class="flex-1">
              <h3 class="text-lg font-semibold text-gray-800">${escapeHtml(novel.title)}</h3>
              <p class="text-sm text-gray-600">by ${escapeHtml(novel.author)}</p>
              <p class="text-gray-700 mt-1"><span class="font-medium">${novel.totalViews.toLocaleString()}</span> total views</p>
            </div>
            <i class="fa-solid fa-angle-right text-gray-400 text-xl"></i>
          `;
          list.appendChild(div);
        });
      });
    }

    // Helper to escape HTML (security)
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function openNovel(bookId) {
      window.location.href = `book.html?id=${encodeURIComponent(bookId)}`;
    }

    // AUTH SYSTEM (kept as original Google sign‑in – you can change later)
    function toggleAuth() {
      if (auth.currentUser) auth.signOut();
      else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    auth.onAuthStateChanged(user => {
      document.getElementById("auth-btn").innerText = user ? "Sign Out" : "Sign In";
    });

    // SEARCH
    function searchNovels() {
      const query = document.getElementById("search-input").value.toLowerCase();
      const cards = document.querySelectorAll("#top-novels-list .book-card");
      cards.forEach(card => {
        const title = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = title.includes(query) ? "" : "none";
      });
    }

    // INIT
    loadLogo();
    loadTopNovels();
  </script>
</body>
</html>
