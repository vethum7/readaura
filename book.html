<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Details — ReadAura</title>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888"
     crossorigin="anonymous"></script>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .chapter-card {
      transition: background-color 0.2s ease;
    }
    .chapter-card:hover {
      background-color: #f3e8ff;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="p-3 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div id="logo" class="cursor-pointer flex items-center" onclick="goHome()">
        <img id="site-logo" src="https://i.imgur.com/8WN9Od9.png" alt="ReadAura Logo" class="h-10 w-auto rounded">
      </div>
      <button onclick="goHome()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Home
      </button>
      <button onclick="goToTopNovels()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Top Novels
      </button>
    </div>
    <div class="flex items-center space-x-2">
      <button id="auth-btn" class="bg-purple-600 text-white px-3 py-1 rounded" onclick="toggleAuth()">
        Sign In
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto p-6 mt-6" id="book-content">
    <p class="text-center text-gray-500">Loading book details...</p>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white py-6 mt-10">
    <div class="container mx-auto text-center text-sm">
      &copy; 2025 ReadAura. All rights reserved.
    </div>
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // ✅ Firebase Config (same as your other pages)
    const firebaseConfig = {
      apiKey: "AIzaSyA6-ATQLe_1n-GLzeXelqoO7Rm_WRXGR68",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    /* ===============================
       🔹 NAVIGATION
    ================================ */
    function goHome() {
      window.location.href = "index.html";
    }
    function goToTopNovels() {
      window.location.href = "top-novels.html";
    }

    /* ===============================
       🔹 LOAD LOGO
    ================================ */
    function loadLogo() {
      db.ref("site/logo").on("value", snap => {
        const logoUrl = snap.val();
        const logoImg = document.getElementById("site-logo");
        logoImg.src = logoUrl || "https://i.imgur.com/8WN9Od9.png";
      });
    }

    /* ===============================
       🔹 GET BOOK ID FROM URL
    ================================ */
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");

    /* ===============================
       🔹 LOAD BOOK DETAILS
    ================================ */
    function loadBookDetails() {
      const content = document.getElementById("book-content");

      if (!bookId) {
        content.innerHTML = "<p class='text-center text-red-500'>Invalid book link.</p>";
        return;
      }

      db.ref("books/" + bookId).once("value").then(snapshot => {
        if (!snapshot.exists()) {
          content.innerHTML = "<p class='text-center text-gray-500'>Book not found.</p>";
          return;
        }

        const data = snapshot.val();
        const cover = data.cover || "https://via.placeholder.com/150?text=No+Cover";
        const title = data.title || "Untitled Novel";
        const author = data.author || "Unknown Author";
        const description = data.description || "No description available.";
        const views = data.weeklyViews || 0;
        const chapters = data.chapters || {};

        // Display the book details
        content.innerHTML = `
          <div class="bg-white shadow-lg rounded-lg p-6 md:flex">
            <img src="${cover}" alt="${title}" class="w-48 h-64 object-cover rounded-lg mx-auto md:mx-0">
            <div class="md:ml-8 mt-6 md:mt-0 flex-1">
              <h1 class="text-2xl font-bold mb-2 text-purple-700">${title}</h1>
              <p class="text-gray-600 mb-2">by <span class="font-medium">${author}</span></p>
              <p class="text-sm text-gray-500 mb-4">${views} views this week</p>
              <p class="text-gray-700 leading-relaxed">${description}</p>
            </div>
          </div>

          <h2 class="text-xl font-semibold mt-8 mb-3 text-gray-800">📖 Chapters</h2>
          <div id="chapters-list" class="space-y-2"></div>
        `;

        // Load chapters
        const chaptersList = document.getElementById("chapters-list");
        const chapterKeys = Object.keys(chapters);

        if (chapterKeys.length === 0) {
          chaptersList.innerHTML = "<p class='text-gray-500'>No chapters available yet.</p>";
        } else {
          chapterKeys.forEach(chapterId => {
            const chapter = chapters[chapterId];
            const div = document.createElement("div");
            div.className = "chapter-card p-3 bg-white rounded-lg shadow cursor-pointer";
            div.innerHTML = `
              <h3 class="font-semibold text-gray-800">${chapter.title || "Untitled Chapter"}</h3>
              <p class="text-sm text-gray-500">Words: ${chapter.wordCount || 0}</p>
            `;
            div.onclick = () => openChapter(bookId, chapterId);
            chaptersList.appendChild(div);
          });
        }
      });
    }

    /* ===============================
       🔹 OPEN CHAPTER
    ================================ */
    function openChapter(bookId, chapterId) {
      window.location.href = `chapter.html?book=${encodeURIComponent(bookId)}&chapter=${encodeURIComponent(chapterId)}`;
    }

    /* ===============================
       🔹 AUTH
    ================================ */
    function toggleAuth() {
      if (auth.currentUser) auth.signOut();
      else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }

    auth.onAuthStateChanged(user => {
      document.getElementById("auth-btn").innerText = user ? "Sign Out" : "Sign In";
    });

    // ✅ Initialize
    loadLogo();
    loadBookDetails();
  </script>
</body>
</html>
