<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadAura — Read Books Online: Chapters & Details</title>
  <meta name="description" content="Read full books online on ReadAura. Browse chapters, bookmark your favorites, and track reading progress. Join our community today." />
  <meta name="keywords" content="read books online, book chapters, free novels, reading community" />
  <meta name="author" content="ReadAura" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.imgur.com/8WN9Od9.png">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888"
    crossorigin="anonymous"></script>

  <!-- Tailwind CSS + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .book-cover {
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .chapter-card:hover {
      background-color: #f3f4f6;
    }
    #load-more-btn {
      transition: all 0.2s;
    }
    #load-more-btn:hover {
      background-color: #7c3aed;
    }
    #back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: none;
      z-index: 99;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- ========== HEADER (consistent with index) ========== -->
  <header class="p-3 flex items-center justify-between flex-wrap">
    <div class="flex items-center space-x-4">
      <div id="logo" class="cursor-pointer flex items-center" onclick="goHome()">
        <img id="site-logo" src="https://i.imgur.com/8WN9Od9.png" alt="ReadAura Logo" class="h-10 w-auto rounded">
      </div>
      <button onclick="goHome()" class="text-purple-600 font-semibold hover:underline">Home</button>
      <button onclick="window.location.href='top-novels.html'" class="text-purple-600 font-semibold hover:underline">Top Novels</button>
      <button onclick="goToAuthorPage()" class="text-purple-600 font-semibold hover:underline">Become an Author</button>
    </div>

    <div class="flex items-center space-x-2 mt-2 sm:mt-0">
      <div class="flex items-center bg-gray-100 px-3 py-1 rounded w-48 sm:w-64">
        <i class="fas fa-search text-gray-500 mr-2"></i>
        <input id="search-input" type="text" placeholder="Search chapters..." 
          class="bg-transparent outline-none w-full text-sm" oninput="searchChapters()">
      </div>

      <!-- Profile area (shown when logged in) -->
      <div id="user-profile" class="hidden flex items-center space-x-2 bg-gray-100 px-3 py-1 rounded">
        <div id="avatar-shadow" class="text-xl"></div>
        <span id="user-firstname" class="text-sm font-semibold"></span>
        <button onclick="signOut()" class="text-xs text-red-500 ml-1 hover:underline">Logout</button>
      </div>

      <!-- Sign In button -->
      <button id="auth-btn" class="bg-purple-600 text-white px-3 py-1 rounded" onclick="window.location.href='login.html'">
        Sign In
      </button>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="container mx-auto p-6">
    <!-- Loading indicator -->
    <div id="loading-indicator" class="text-center py-10">
      <i class="fas fa-spinner fa-pulse text-purple-600 text-3xl"></i>
      <p class="mt-2 text-gray-600">Loading book details...</p>
    </div>

    <div id="book-detail" class="bg-white rounded-lg shadow-lg p-6 hidden">
      <div class="flex flex-col md:flex-row">
        <img id="book-cover" src="https://via.placeholder.com/200x300" alt="Book Cover" class="book-cover w-40 h-56 md:w-52 md:h-72 object-cover rounded-lg mx-auto md:mx-0" />
        <div class="md:ml-6 mt-4 md:mt-0 flex-1">
          <div class="flex justify-between items-start">
            <h1 id="book-title" class="text-2xl font-bold text-gray-900 mb-2">Book Title</h1>
            <button id="bookmark-btn" class="text-gray-500 hover:text-purple-600 text-xl" onclick="toggleBookmark()">
              <i id="bookmark-icon" class="far fa-bookmark"></i>
            </button>
          </div>
          <p id="book-author" class="text-gray-600 mb-1">Author: Unknown</p>
          <p id="book-genre" class="text-gray-600 mb-1">Genre: N/A</p>
          <p id="book-status" class="text-gray-600 mb-1">Status: Ongoing</p>
          <p id="book-updated" class="text-gray-500 text-sm mb-3">Last updated: Just now</p>

          <!-- Tags -->
          <div id="book-tags" class="mt-2 mb-4">
            <h3 class="text-md font-semibold mb-1">Tags:</h3>
            <div id="tags-container" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="flex space-x-3 mt-3 flex-wrap gap-2">
            <button id="read-now-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded shadow-md" onclick="readNow()">📖 Read Now</button>
            <button onclick="shareBook()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded shadow-md">🔗 Share</button>
          </div>
        </div>
      </div>

      <!-- Description -->
      <section class="mt-8">
        <h2 class="text-xl font-semibold border-b pb-2 mb-3">📖 Book Description</h2>
        <p id="book-summary" class="text-gray-700 leading-relaxed">Loading description...</p>
      </section>

      <!-- Chapters -->
      <section class="mt-8">
        <h2 class="text-xl font-semibold border-b pb-2 mb-3">📑 Chapters</h2>
        <div id="chapter-list" class="space-y-2 max-h-96 overflow-y-auto">
          <p class="text-gray-500 text-sm">Loading chapters...</p>
        </div>
        <div id="load-more-container" class="text-center mt-4 hidden">
          <button id="load-more-btn" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 transition">
            Load More Chapters
          </button>
        </div>
      </section>
    </div>
  </main>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="bg-purple-600 text-white p-3 rounded-full shadow-lg hover:bg-purple-700 transition">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- ========== FOOTER (with Contact link) ========== -->
  <footer class="bg-gray-200 text-gray-700 p-4 mt-8 text-center">
    <a href="index.html" class="text-purple-600 hover:underline mx-2">Home</a> |
    <a href="about.html" class="text-purple-600 hover:underline mx-2">About Us</a> |
    <a href="privacy.html" class="text-purple-600 hover:underline mx-2">Privacy Policy</a> |
    <a href="terms.html" class="text-purple-600 hover:underline mx-2">Terms of Service</a> |
    <a href="contact.html" class="text-purple-600 hover:underline mx-2">Contact</a>
    <p class="mt-2 text-sm">&copy; 2026 ReadAura. All rights reserved.</p>
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
      apiKey: "AIzaSyBIums2N8B9AcAqwbstg1eVOOGsJZXrnPU",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // Global variables
    let currentUser = null;
    let allChapters = [];        // full array of {key, title, number}
    let displayedCount = 28;     // initial number to show
    let currentBookId = null;
    let bookmarks = [];           // array of bookmarked book IDs

    // Helper functions
    function getQueryParam(param) {
      return new URLSearchParams(window.location.search).get(param);
    }

    function goHome() { window.location.href = "index.html"; }
    function goToAuthorPage() { window.location.href = "become-an-author.html"; }

    // ========== AUTH & PROFILE ==========
    function signOut() { auth.signOut(); }

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      const profileDiv = document.getElementById('user-profile');
      const authBtn = document.getElementById('auth-btn');

      if (user) {
        const snapshot = await db.ref('users/' + user.uid).once('value');
        const profile = snapshot.val();
        if (profile && profile.firstName) {
          profileDiv.classList.remove('hidden');
          authBtn.classList.add('hidden');
          document.getElementById('user-firstname').innerText = profile.firstName;
          const shadowDiv = document.getElementById('avatar-shadow');
          if (profile.gender === 'male') shadowDiv.innerHTML = '<i class="fas fa-user-astronaut fa-lg text-purple-700"></i>';
          else if (profile.gender === 'female') shadowDiv.innerHTML = '<i class="fas fa-user-circle fa-lg text-pink-500"></i>';
          else shadowDiv.innerHTML = '<i class="fas fa-user fa-lg text-gray-500"></i>';
        } else {
          window.location.href = 'complete-profile.html';
        }
        // Load bookmarks for this user
        loadBookmarks();
      } else {
        profileDiv.classList.add('hidden');
        authBtn.classList.remove('hidden');
      }
      // Update bookmark icon if book is loaded
      updateBookmarkIcon();
    });

    // Load bookmarks from Firebase
    function loadBookmarks() {
      if (!currentUser) return;
      db.ref('bookmarks/' + currentUser.uid).on('value', snap => {
        bookmarks = snap.val() || [];
        updateBookmarkIcon();
      });
    }

    function toggleBookmark() {
      if (!currentUser) {
        alert('Please sign in to bookmark books.');
        window.location.href = 'login.html';
        return;
      }
      if (!currentBookId) return;
      const uid = currentUser.uid;
      let newBookmarks;
      if (bookmarks.includes(currentBookId)) {
        newBookmarks = bookmarks.filter(b => b !== currentBookId);
      } else {
        newBookmarks = [...bookmarks, currentBookId];
      }
      db.ref('bookmarks/' + uid).set(newBookmarks);
    }

    function updateBookmarkIcon() {
      const icon = document.getElementById('bookmark-icon');
      if (!icon) return;
      if (currentBookId && bookmarks.includes(currentBookId)) {
        icon.className = 'fas fa-bookmark text-purple-600';
      } else {
        icon.className = 'far fa-bookmark text-gray-500';
      }
    }

    // ========== LOAD LOGO ==========
    function loadLogo() {
      db.ref("site/logo").on("value", snap => {
        const url = snap.val();
        document.getElementById("site-logo").src = url || "https://i.imgur.com/8WN9Od9.png";
      });
    }

    // ========== READ NOW ==========
    function readNow() {
      if (!currentBookId) return;
      if (allChapters.length > 0) {
        window.location.href = `chapter.html?bookId=${currentBookId}&chapter=${allChapters[0].key}`;
      } else {
        alert('No chapters available for this book yet.');
      }
    }

    // ========== SHARE BOOK ==========
    function shareBook() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({
          title: document.getElementById('book-title').innerText,
          text: 'Check out this book on ReadAura!',
          url: url
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url);
        alert('Link copied to clipboard!');
      }
    }

    // ========== RENDER CHAPTERS ==========
    function renderChapters() {
      const container = document.getElementById('chapter-list');
      const loadMoreContainer = document.getElementById('load-more-container');
      const toShow = allChapters.slice(0, displayedCount);
      container.innerHTML = '';
      if (toShow.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-sm">No chapters found.</p>';
        loadMoreContainer.classList.add('hidden');
        return;
      }
      toShow.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'chapter-card border p-3 rounded cursor-pointer hover:bg-gray-50 flex justify-between items-center';
        div.innerHTML = `<span>${ch.title}</span><i class="fas fa-chevron-right text-gray-400 text-sm"></i>`;
        div.onclick = () => {
          window.location.href = `chapter.html?bookId=${currentBookId}&chapter=${ch.key}`;
        };
        container.appendChild(div);
      });
      if (allChapters.length > displayedCount) {
        loadMoreContainer.classList.remove('hidden');
      } else {
        loadMoreContainer.classList.add('hidden');
      }
    }

    function loadMoreChapters() {
      displayedCount += 20;
      renderChapters();
    }

    // ========== LOAD BOOK DETAILS ==========
    async function loadBook() {
      const bookId = getQueryParam("id");
      if (!bookId) {
        document.getElementById("loading-indicator").innerHTML = '<p class="text-red-500">Invalid book ID.</p>';
        return;
      }
      currentBookId = bookId;

      // Show loading, hide detail
      document.getElementById("loading-indicator").classList.remove("hidden");
      document.getElementById("book-detail").classList.add("hidden");

      const bookSnap = await db.ref(`books/${bookId}`).once('value');
      const book = bookSnap.val();
      if (!book) {
        document.getElementById("loading-indicator").innerHTML = '<p class="text-red-500">Book not found.</p>';
        return;
      }

      // Fill book info
      document.getElementById("book-title").innerText = book.title || "Untitled";
      document.getElementById("book-author").innerText = "Author: " + (book.author || "Unknown");
      document.getElementById("book-genre").innerText = "Genre: " + (book.genre || "N/A");
      document.getElementById("book-status").innerText = "Status: " + (book.status || "Ongoing");
      document.getElementById("book-updated").innerText = "Last updated: " + (book.lastUpdated || "Recently");
      document.getElementById("book-summary").innerText = book.description || "No description available.";
      document.getElementById("book-cover").src = book.cover || "https://via.placeholder.com/200x300";

      // Tags
      const tagsContainer = document.getElementById("tags-container");
      tagsContainer.innerHTML = "";
      if (book.tags) {
        const tagArray = Array.isArray(book.tags) ? book.tags : Object.values(book.tags);
        tagArray.forEach(tag => {
          if (tag) {
            const span = document.createElement("span");
            span.className = "px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded-full";
            span.innerText = tag;
            tagsContainer.appendChild(span);
          }
        });
      }

      // Increment views and weeklyViews (atomic)
      try {
        await db.ref(`books/${bookId}/views`).transaction(curr => (curr || 0) + 1);
        await db.ref(`books/${bookId}/weeklyViews`).transaction(curr => (curr || 0) + 1);
      } catch(e) { console.warn("View increment failed", e); }

      // Load chapters
      const chaptersSnap = await db.ref(`chapters/${bookId}`).once('value');
      if (chaptersSnap.exists()) {
        let chapters = [];
        chaptersSnap.forEach(child => {
          const key = child.key;
          const val = child.val();
          let title = val.title || `Chapter ${key}`;
          // Try to parse numeric order
          let num = isNaN(parseInt(key)) ? Infinity : parseInt(key);
          // Also check if chapter has a 'number' field
          if (val.number && !isNaN(val.number)) num = val.number;
          chapters.push({ key, title, number: num });
        });
        // Sort by number (or key if numbers equal)
        chapters.sort((a,b) => {
          if (a.number !== b.number) return a.number - b.number;
          return String(a.key).localeCompare(String(b.key), undefined, { numeric: true });
        });
        allChapters = chapters;
        displayedCount = 28;
        renderChapters();
      } else {
        allChapters = [];
        renderChapters();
      }

      // Attach load more button
      const loadMoreBtn = document.getElementById('load-more-btn');
      if (loadMoreBtn) loadMoreBtn.onclick = loadMoreChapters;

      // Hide loading, show book detail
      document.getElementById("loading-indicator").classList.add("hidden");
      document.getElementById("book-detail").classList.remove("hidden");

      // Update bookmark icon after book loaded
      updateBookmarkIcon();
    }

    // ========== SEARCH CHAPTERS (filter visible ones) ==========
    function searchChapters() {
      const query = document.getElementById("search-input").value.trim().toLowerCase();
      const chapterDivs = document.querySelectorAll("#chapter-list .chapter-card");
      chapterDivs.forEach(div => {
        const text = div.innerText.toLowerCase();
        div.style.display = text.includes(query) ? "" : "none";
      });
    }

    // ========== BACK TO TOP BUTTON ==========
    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTop.style.display = 'flex';
      } else {
        backToTop.style.display = 'none';
      }
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ========== INITIALIZE ==========
    loadLogo();
    loadBook();
  </script>
</body>
</html>
