<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAura — Book Details</title>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="p-4 bg-white shadow-md flex justify-between items-center sticky top-0">
    <div class="flex items-center space-x-3">
      <img src="https://i.imgur.com/8WN9Od9.png" alt="Logo" class="h-10 rounded cursor-pointer" onclick="goHome()">
      <h1 class="text-xl font-semibold text-purple-700 cursor-pointer" onclick="goHome()">ReadAura</h1>
    </div>
    <button class="bg-purple-600 text-white px-4 py-1 rounded" onclick="goBack()">Back</button>
  </header>

  <!-- Book Details -->
  <main class="container mx-auto p-6" id="book-container">
    <p class="text-center text-gray-500">Loading book details...</p>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA6-ATQLe_1n-GLzeXelqoO7Rm_WRXGR68",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Navigation
    function goHome() {
      window.location.href = "index.html";
    }
    function goBack() {
      window.history.back();
    }

    // Get book ID from URL
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");

    // Load book data
    function loadBook() {
      const container = document.getElementById("book-container");

      if (!bookId) {
        container.innerHTML = "<p class='text-center text-red-500'>Book not found.</p>";
        return;
      }

      const bookRef = db.ref("books/" + bookId);
      bookRef.once("value").then(snap => {
        if (!snap.exists()) {
          container.innerHTML = "<p class='text-center text-red-500'>Book not found.</p>";
          return;
        }

        const book = snap.val();

        container.innerHTML = `
          <div class="bg-white rounded-lg shadow-lg p-6 max-w-3xl mx-auto">
            <div class="flex flex-col md:flex-row items-center">
              <img src="${book.cover || 'https://via.placeholder.com/150'}" alt="${book.title}"
                   class="w-48 h-64 object-cover rounded-lg mb-4 md:mb-0 md:mr-6">
              <div>
                <h2 class="text-2xl font-bold mb-2">${book.title}</h2>
                <p class="text-gray-700 mb-1">By <span class="font-medium">${book.author || 'Unknown'}</span></p>
                <p class="text-sm text-gray-500 mb-3">${book.views || 0} total views</p>
                <p class="text-gray-800 leading-relaxed">${book.description || 'No description available.'}</p>
              </div>
            </div>
            <div class="mt-6 border-t pt-4" id="chapters-container">
              <h3 class="text-xl font-semibold mb-3">📖 Chapters</h3>
              <p class="text-gray-500">Loading chapters...</p>
            </div>
          </div>
        `;

        incrementViews(bookRef, book);
        loadChapters(bookId);
      });
    }

    // Increment views
    function incrementViews(bookRef, book) {
      const totalViews = (book.views || 0) + 1;
      const weeklyViews = (book.weeklyViews || 0) + 1;

      bookRef.update({
        views: totalViews,
        weeklyViews: weeklyViews
      });
    }

    // Load chapters
    function loadChapters(bookId) {
      const chaptersRef = db.ref("chapters/" + bookId);
      const container = document.getElementById("chapters-container");

      chaptersRef.once("value").then(snapshot => {
        if (!snapshot.exists()) {
          container.innerHTML = "<p class='text-gray-500'>No chapters yet.</p>";
          return;
        }

        const chapters = snapshot.val();
        const sortedKeys = Object.keys(chapters).sort((a, b) => {
          const numA = parseInt(a.replace(/\D/g, '')) || 0;
          const numB = parseInt(b.replace(/\D/g, '')) || 0;
          return numA - numB;
        });

        container.innerHTML = "<h3 class='text-xl font-semibold mb-3'>📖 Chapters</h3><div class='space-y-3'></div>";
        const listContainer = container.querySelector('div.space-y-3');

        sortedKeys.forEach((key, index) => {
          const chapter = chapters[key];
          const chapterTitle = chapter.title || `Chapter ${index + 1}`;
          const chapterContent = chapter.content || 'No content available.';

          const chapterBlock = document.createElement("div");
          chapterBlock.className = "border border-gray-200 rounded-lg overflow-hidden";

          chapterBlock.innerHTML = `
            <button class="w-full text-left px-4 py-2 bg-gray-100 hover:bg-gray-200 font-semibold"
                    onclick="toggleChapterContent('${key}')">
              ${chapterTitle}
            </button>
            <div id="content-${key}" class="hidden px-4 py-3 bg-white text-gray-800 whitespace-pre-line">
              ${chapterContent}
            </div>
          `;

          listContainer.appendChild(chapterBlock);
        });
      });
    }

    // Toggle chapter content visibility
    function toggleChapterContent(chapterId) {
      const content = document.getElementById(`content-${chapterId}`);
      content.classList.toggle("hidden");
    }

    loadBook();
  </script>
</body>
</html>
