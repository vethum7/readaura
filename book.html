<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Book — ReadAura</title>


<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888" crossorigin="anonymous"></script>


<style>
body {
background-color: #0d0d0d;
color: #f5f5f5;
}
.chapter-card:hover {
background-color: #1b1b1b;
}
html {
scroll-behavior: smooth;
}
</style>
</head>
<body class="min-h-screen flex flex-col">


<!-- Header -->
<header class="bg-black text-white py-4 shadow-lg sticky top-0 z-50">
<div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
<h1 class="text-2xl font-bold">ReadAura</h1>
<a href="/" class="text-gray-300 hover:text-white">Home</a>
</div>
</header>


<!-- Book Title & Info -->
<section id="top" class="max-w-5xl mx-auto px-4 py-6">
<h2 id="bookTitle" class="text-4xl font-bold mb-2">Loading...</h2>
<p id="bookAuthor" class="text-gray-400 text-lg"></p>
</section>


<!-- Chapter List Section -->
<section class="max-w-5xl mx-auto px-4 py-4" id="chapterListSection">
<h3 class="text-2xl font-semibold mb-4">Chapters</h3>
<div id="chapterList" class="space-y-3"></div>
</section>


<!-- Reading Section -->
<section id="readingSection" class="max-w-5xl mx-auto px-4 py-6 hidden">
<button onclick="goBackToChapters()" class="mb-4 bg-gray-800 px-4 py-2 rounded hover:bg-gray-700">← Back to Chapters</button>
<h3 id="currentChapterTitle" class="text-3xl font-bold mb-4"></h3>


<!-- AdSense Ad -->
<div class="my-4">
<ins class="adsbygoogle"
style="display:block; text-align:center;"
data-ad-layout="in-article"
data-ad-format="fluid"
data-ad-client="ca-pub-2883257010372888"
data-ad-slot="1234567890"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>


<p id="chapterContent" class="leading-8 text-lg whitespace-pre-line"></p>


<!-- Bottom Navigation -->
<div class="flex justify-between mt-8">
