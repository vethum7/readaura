<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadAura — Book</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-40">
    <h1 class="font-bold text-xl text-purple-600 cursor-pointer" onclick="goHome()">ReadAura</h1>
    <button onclick="goBack()" class="text-blue-500">&larr; Back</button>
  </header>

  <!-- Main -->
  <main class="container mx-auto p-6">

    <h2 id="book-title" class="text-3xl font-bold mb-2"></h2>
    <p id="book-author" class="text-gray-600 mb-4"></p>

    <!-- Book Cover -->
    <img id="book-cover" class="w-48 rounded shadow mb-6" />

    <!-- Description -->
    <p id="book-description" class="mb-6 whitespace-pre-line"></p>

    <!-- Chapters List -->
    <h3 class="text-xl font-bold mb-2">Chapters</h3>
    <div id="chapter-list" class="space-y-2"></div>

  </main>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyA6-ATQLe_1n-GLzeXelqoO7Rm_WRXGR68",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL param
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const bookId = getParam("id");

    // Load Book Data
    function loadBook() {
      db.ref("books/" + bookId).once("value").then((snap) => {
        if (!snap.exists()) return alert("Book not found.");

        const book = snap.val();

        document.getElementById("book-title").innerText = book.title;
        document.getElementById("book-author").innerText = "By " + (book.author || "Unknown");
        document.getElementById("book-description").innerText = book.description || "";
        document.getElementById("book-cover").src = book.cover || "";
      });

      loadChapters();
    }

    // Load Chapters — FIXED FOR STRUCTURE B
    function loadChapters() {
      db.ref("chapters").once("value").then((snap) => {
        const chapterListDiv = document.getElementById("chapter-list");
        chapterListDiv.innerHTML = "";

        const chapters = [];

        snap.forEach((ch) => {
          const c = ch.val();
          if (c.bookId === bookId) {
            chapters.push({
              id: ch.key,
              number: c.chapterNumber,
              title: c.title || "Untitled Chapter",
            });
          }
        });

        chapters.sort((a, b) => a.number - b.number);

        chapters.forEach((ch) => {
          const div = document.createElement("div");
          div.className = "p-3 border rounded cursor-pointer hover:bg-gray-100";
          div.innerText = `Chapter ${ch.number}: ${ch.title}`;

          div.onclick = () =>
            (window.location.href = `chapter.html?bookId=${bookId}&chapter=${ch.number}`);

          chapterListDiv.appendChild(div);
        });

        if (chapters.length === 0) {
          chapterListDiv.innerHTML = "<p class='text-gray-500'>No chapters found.</p>";
        }
      });
    }

    // Navigation
    function goBack() {
      window.history.back();
    }
    function goHome() {
      window.location.href = "index.html";
    }

    loadBook();
  </script>
</body>
</html>
