<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAura — Read Chapter: Next & Previous Navigation</title>
  <meta name="description" content="Read book chapters on ReadAura with easy next/previous navigation. Enjoy seamless reading experience on any device.">
  <meta name="keywords" content="read chapter, book chapter, next chapter, previous chapter, online reading">
  <meta name="author" content="ReadAura">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.imgur.com/8WN9Od9.png">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888"
    crossorigin="anonymous"></script>

  <!-- Tailwind CSS + Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 50;
    }
    .overlay-content {
      background: #fff;
      padding: 1rem;
      max-height: 80%;
      overflow-y: auto;
      width: 90%;
      max-width: 500px;
      border-radius: 0.5rem;
    }
    .chapter-content {
      font-size: 1.125rem;
      line-height: 1.75;
      /* Preserve whitespace, tabs, and line breaks exactly as written */
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chapter-content p {
      margin-bottom: 1rem;
      /* Ensure paragraphs also preserve whitespace */
      white-space: pre-wrap;
    }
    .nav-arrow {
      transition: all 0.2s;
    }
    .nav-arrow:hover:not(:disabled) {
      background-color: #7c3aed;
      color: white;
    }
    .nav-arrow:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex flex-wrap justify-between items-center sticky top-0 z-40">
    <div class="flex items-center space-x-3">
      <div class="cursor-pointer" onclick="goHome()">
        <img id="site-logo" src="https://i.imgur.com/8WN9Od9.png" alt="ReadAura Logo" class="h-8 w-auto rounded">
      </div>
      <button onclick="goBackToBook()" class="px-3 py-1 border rounded text-sm hover:bg-gray-100">
        <i class="fas fa-book mr-1"></i> Back to Book
      </button>
    </div>
    <div class="flex items-center space-x-2 mt-2 sm:mt-0">
      <!-- Top navigation arrows -->
      <button id="top-prev-btn" onclick="prevChapter()" class="nav-arrow px-3 py-1 bg-gray-200 rounded disabled:opacity-50" aria-label="Previous Chapter">
        <i class="fas fa-chevron-left mr-1"></i> Prev
      </button>
      <button id="top-next-btn" onclick="nextChapter()" class="nav-arrow px-3 py-1 bg-gray-200 rounded" aria-label="Next Chapter">
        Next <i class="fas fa-chevron-right ml-1"></i>
      </button>
      <button onclick="toggleChapterList()" class="px-3 py-1 border rounded ml-2">
        <i class="fas fa-list"></i> Chapters
      </button>
    </div>
  </header>

  <!-- Top Ad -->
  <div id="ad-top" class="container mx-auto p-4 text-center"></div>

  <!-- Chapter Main Content -->
  <main class="container mx-auto p-6 max-w-3xl">
    <!-- Top navigation (duplicate for convenience) -->
    <div class="flex justify-between items-center mb-6 pb-3 border-b">
      <button id="top-prev-btn2" onclick="prevChapter()" class="nav-arrow px-4 py-2 bg-gray-200 rounded-lg disabled:opacity-50">
        <i class="fas fa-arrow-left mr-2"></i> Previous Chapter
      </button>
      <button id="top-next-btn2" onclick="nextChapter()" class="nav-arrow px-4 py-2 bg-gray-200 rounded-lg">
        Next Chapter <i class="fas fa-arrow-right ml-2"></i>
      </button>
    </div>

    <!-- Chapter Title & Content -->
    <h2 id="chapter-title" class="text-2xl md:text-3xl font-bold mb-6 text-purple-800"></h2>
    <div id="chapter-content" class="chapter-content prose max-w-none bg-white p-6 rounded-lg shadow-sm"></div>

    <!-- Middle Ad -->
    <div id="ad-middle" class="my-8 text-center"></div>

    <!-- Bottom Navigation (duplicate) -->
    <div class="flex justify-between items-center mt-8 pt-4 border-t">
      <button id="bottom-prev-btn" onclick="prevChapter()" class="nav-arrow px-4 py-2 bg-gray-200 rounded-lg disabled:opacity-50">
        <i class="fas fa-arrow-left mr-2"></i> Previous
      </button>
      <button id="bottom-next-btn" onclick="nextChapter()" class="nav-arrow px-4 py-2 bg-gray-200 rounded-lg">
        Next <i class="fas fa-arrow-right ml-2"></i>
      </button>
    </div>

    <!-- Bottom Ad -->
    <div id="ad-bottom" class="my-6 text-center"></div>
  </main>

  <!-- Chapter List Overlay -->
  <div id="chapter-overlay" class="overlay">
    <div class="overlay-content">
      <h3 class="text-lg font-bold mb-3 flex justify-between items-center">
        <span><i class="fas fa-book-open"></i> All Chapters</span>
        <button onclick="toggleChapterList()" class="text-gray-500 hover:text-gray-800">&times;</button>
      </h3>
      <div id="chapter-list-popup" class="space-y-2 max-h-96 overflow-y-auto"></div>
    </div>
  </div>

  <!-- Footer (with Contact link for AdSense) -->
  <footer class="bg-gray-800 text-gray-300 py-6 mt-12">
    <div class="container mx-auto text-center text-sm">
      <div class="flex flex-wrap justify-center gap-4 mb-3">
        <a href="index.html" class="hover:text-white transition">Home</a>
        <a href="about.html" class="hover:text-white transition">About Us</a>
        <a href="privacy.html" class="hover:text-white transition">Privacy Policy</a>
        <a href="terms.html" class="hover:text-white transition">Terms of Service</a>
        <a href="contact.html" class="hover:text-white transition">Contact</a>
      </div>
      <p>&copy; 2026 ReadAura. All rights reserved.</p>
    </div>
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    // ========== FIREBASE CONFIG (corrected to match your project) ==========
    const firebaseConfig = {
      apiKey: "AIzaSyBIums2N8B9AcAqwbstg1eVOOGsJZXrnPU",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL parameters
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const bookId = getParam("bookId");
    let chapterKey = getParam("chapter");      // can be string (push ID) or numeric
    let chapters = [];           // array of {key, title, content, order}
    let currentIndex = -1;

    // Helper: extract numeric order from key if possible, else use index
    function extractOrder(key) {
      // If key is a pure number, return it
      if (/^\d+$/.test(key)) return parseInt(key, 10);
      // Firebase push IDs are timestamp-based, we can't reliably sort them by creation.
      // Better to rely on a custom 'order' field if present, else fallback to string compare.
      return key;
    }

    // Load chapter data from Firebase
    async function loadChapter() {
      if (!bookId) {
        document.getElementById("chapter-title").innerText = "Missing book ID";
        return;
      }

      // Fetch all chapters for this book
      const snap = await db.ref(`chapters/${bookId}`).once('value');
      if (!snap.exists()) {
        document.getElementById("chapter-title").innerText = "No chapters found";
        return;
      }

      chapters = [];
      snap.forEach(child => {
        const data = child.val();
        chapters.push({
          key: child.key,
          title: data.title || `Chapter ${child.key}`,
          content: data.content || "",
          order: data.order !== undefined ? data.order : extractOrder(child.key)
        });
      });

      // Sort chapters: first by 'order' (numeric if possible), then by key as fallback
      chapters.sort((a, b) => {
        let orderA = typeof a.order === 'number' ? a.order : (isNaN(parseInt(a.order)) ? Infinity : parseInt(a.order));
        let orderB = typeof b.order === 'number' ? b.order : (isNaN(parseInt(b.order)) ? Infinity : parseInt(b.order));
        if (orderA !== orderB) return orderA - orderB;
        return String(a.key).localeCompare(String(b.key), undefined, { numeric: true });
      });

      // Find current chapter index by matching key (chapterKey from URL)
      currentIndex = chapters.findIndex(ch => ch.key === chapterKey);
      if (currentIndex === -1 && chapterKey && !isNaN(parseInt(chapterKey))) {
        // Fallback: try to match by numeric order if chapterKey is a number
        currentIndex = chapters.findIndex(ch => ch.order == chapterKey);
      }
      if (currentIndex === -1 && chapters.length > 0) currentIndex = 0; // default to first chapter

      renderCurrentChapter();
      loadAds();
      buildChapterListPopup();
      updateNavButtons();
    }

    function renderCurrentChapter() {
      if (currentIndex < 0 || currentIndex >= chapters.length) {
        document.getElementById("chapter-title").innerText = "Chapter not found";
        document.getElementById("chapter-content").innerHTML = "<p>This chapter does not exist.</p>";
        return;
      }
      const chapter = chapters[currentIndex];
      document.getElementById("chapter-title").innerText = chapter.title;
      // Use innerHTML to allow formatted content (paragraphs, etc.)
      // White-space is now preserved via CSS (white-space: pre-wrap)
      document.getElementById("chapter-content").innerHTML = chapter.content || "<p>No content available.</p>";
      // Update URL without reload (push state)
      const newUrl = `chapter.html?bookId=${bookId}&chapter=${chapter.key}`;
      window.history.pushState({}, "", newUrl);
    }

    function updateNavButtons() {
      const hasPrev = currentIndex > 0;
      const hasNext = currentIndex < chapters.length - 1;

      const prevBtns = ['top-prev-btn', 'top-prev-btn2', 'bottom-prev-btn'];
      const nextBtns = ['top-next-btn', 'top-next-btn2', 'bottom-next-btn'];

      prevBtns.forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
          btn.disabled = !hasPrev;
          btn.classList.toggle('opacity-50', !hasPrev);
        }
      });
      nextBtns.forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
          btn.disabled = !hasNext;
          btn.classList.toggle('opacity-50', !hasNext);
        }
      });
    }

    function prevChapter() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCurrentChapter();
        updateNavButtons();
        // Also rebuild popup to highlight current? optional
        buildChapterListPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function nextChapter() {
      if (currentIndex < chapters.length - 1) {
        currentIndex++;
        renderCurrentChapter();
        updateNavButtons();
        buildChapterListPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function goBackToBook() {
      if (bookId) {
        window.location.href = `book.html?id=${bookId}`;
      } else {
        alert("Book ID missing.");
      }
    }

    // Chapter list overlay
    function toggleChapterList() {
      const overlay = document.getElementById("chapter-overlay");
      overlay.style.display = overlay.style.display === "flex" ? "none" : "flex";
    }

    function buildChapterListPopup() {
      const listDiv = document.getElementById("chapter-list-popup");
      if (!listDiv) return;
      listDiv.innerHTML = "";
      chapters.forEach((ch, idx) => {
        const div = document.createElement("div");
        div.className = `p-2 border rounded cursor-pointer hover:bg-gray-100 ${idx === currentIndex ? 'bg-purple-100 border-purple-400' : ''}`;
        div.innerText = ch.title;
        div.onclick = () => {
          currentIndex = idx;
          renderCurrentChapter();
          updateNavButtons();
          toggleChapterList();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        listDiv.appendChild(div);
      });
    }

    // Load ads from Firebase (same as before)
    async function loadAds() {
      const adsSnap = await db.ref("ads").once("value");
      const ads = [];
      adsSnap.forEach(ad => ads.push(ad.val()));
      const renderAd = (containerId, ad) => {
        const container = document.getElementById(containerId);
        if (container && ad) {
          container.innerHTML = `<a href="${ad.link}" target="_blank" rel="noopener noreferrer"><img src="${ad.imageUrl}" class="mx-auto rounded shadow max-w-full h-auto" style="max-height: 90px;"></a>`;
        } else if (container) {
          container.innerHTML = "";
        }
      };
      renderAd("ad-top", ads[0]);
      renderAd("ad-middle", ads[1]);
      renderAd("ad-bottom", ads[2]);
    }

    // Helper navigation
    function goHome() { window.location.href = "index.html"; }

    // Load logo from Firebase
    function loadLogo() {
      db.ref("site/logo").on("value", snap => {
        const logoUrl = snap.val();
        const logoImg = document.querySelector("#site-logo");
        if (logoImg) logoImg.src = logoUrl || "https://i.imgur.com/8WN9Od9.png";
      });
    }

    // Initialize everything
    loadLogo();
    loadChapter();
  </script>
</body>
</html>
