<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadAura — Read Online</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.imgur.com/8WN9Od9.png">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2883257010372888"
     crossorigin="anonymous"></script>
  
  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .book-card {
      width: 150px;
      transition: transform 0.2s ease;
    }
    .book-card:hover {
      transform: scale(1.03);
    }
    .book-cover {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 0.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800">

  <!-- Header -->
  <header class="p-3 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <div id="logo" class="cursor-pointer flex items-center" onclick="goHome()">
        <img id="site-logo" src="https://i.imgur.com/8WN9Od9.png" alt="ReadAura Logo" class="h-10 w-auto rounded">
      </div>

      <button onclick="showTopNovels()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Top Novels
      </button>

      <button onclick="goToAuthorPage()" class="text-purple-600 font-semibold hover:underline whitespace-nowrap">
        Become an Author
      </button>
    </div>

    <div class="flex items-center space-x-2">
      <div class="flex items-center bg-gray-100 px-3 py-1 rounded w-48 sm:w-64">
        <i class="fas fa-search text-gray-500 mr-2"></i>
        <input id="search-input" type="text" placeholder="Search books..." 
          class="bg-transparent outline-none w-full text-sm" oninput="searchBooks()">
      </div>

      <!-- Profile area (shown when logged in) -->
      <div id="user-profile" class="hidden flex items-center space-x-2 bg-gray-100 px-3 py-1 rounded">
        <div id="avatar-shadow" class="text-xl"></div>
        <span id="user-firstname" class="text-sm font-semibold"></span>
        <button onclick="signOut()" class="text-xs text-red-500 ml-1 hover:underline">Logout</button>
      </div>

      <!-- Sign In button (shown when logged out) -->
      <button id="auth-btn" class="bg-purple-600 text-white px-3 py-1 rounded" onclick="window.location.href='login.html'">
        Sign In
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="container mx-auto p-4 mt-6">
    <div id="books-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>

    <div id="book-detail" class="hidden mt-4">
      <button onclick="showBooks()" class="text-blue-500 mb-2">&larr; Back</button>
      <img id="book-cover" class="w-48 h-64 object-cover mb-4 hidden rounded shadow">
      <h2 id="book-title" class="text-2xl font-bold mb-2"></h2>
      <p id="book-desc" class="mb-2"></p>

      <button id="bookmark-toggle" class="mb-4 px-3 py-1 border rounded" onclick="toggleBookmark()">
        <i id="bookmark-icon" class="far fa-bookmark"></i> Bookmark
      </button>

      <h3 class="text-xl font-bold mb-2">Chapters</h3>
      <div id="chapters-list" class="space-y-2 mb-4"></div>

      <div id="ads-space" class="my-4"></div>

      <h3 class="text-xl font-bold">Comments</h3>
      <textarea id="comment-input" class="border w-full p-2 mt-2"></textarea>
      <button onclick="postComment()" class="bg-purple-600 text-white px-3 py-1 mt-2 mb-4">Post</button>
      <div id="comments-list" class="space-y-2"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-200 text-gray-700 p-4 mt-8 text-center">
    <a href="index.html" class="text-purple-600 hover:underline mx-2">Home</a> |
    <a href="about.html" class="text-purple-600 hover:underline mx-2">About Us</a> |
    <a href="privacy.html" class="text-purple-600 hover:underline mx-2">Privacy Policy</a> |
    <a href="terms.html" class="text-purple-600 hover:underline mx-2">Terms of Service</a>
    <p class="mt-2 text-sm">&copy; 2026 ReadAura. All rights reserved.</p>
  </footer>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAPEzboghpjuqODmwjwM7IHl9KPUl4Xm-U",
      authDomain: "readaura.firebaseapp.com",
      databaseURL: "https://readaura-default-rtdb.firebaseio.com",
      projectId: "readaura",
      storageBucket: "readaura.appspot.com",
      messagingSenderId: "824392534073",
      appId: "1:824392534073:web:dfa30e0e40fa540f16a5e8",
      measurementId: "G-G6SWNJQYR5"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentBookId = null;
    let bookmarks = [];

    // ------------------- PROFILE & AUTH UI -------------------
    function signOut() {
      auth.signOut();
    }

    // Update UI based on auth state + load profile from DB
    auth.onAuthStateChanged(async (user) => {
      const profileDiv = document.getElementById('user-profile');
      const authBtn = document.getElementById('auth-btn');

      if (user) {
        // Fetch profile from Realtime Database (firstName, gender)
        const snapshot = await db.ref('users/' + user.uid).once('value');
        const profile = snapshot.val();

        if (profile && profile.firstName) {
          // Show profile area, hide sign-in button
          profileDiv.classList.remove('hidden');
          authBtn.classList.add('hidden');

          document.getElementById('user-firstname').innerText = profile.firstName;

          // Set gender-based shadow avatar (using Font Awesome icons)
          const shadowDiv = document.getElementById('avatar-shadow');
          if (profile.gender === 'male') {
            shadowDiv.innerHTML = '<i class="fas fa-user-astronaut fa-lg text-purple-700"></i>';
          } else if (profile.gender === 'female') {
            shadowDiv.innerHTML = '<i class="fas fa-user-circle fa-lg text-pink-500"></i>';
          } else {
            shadowDiv.innerHTML = '<i class="fas fa-user fa-lg text-gray-500"></i>';
          }
        } else {
          // User exists in Auth but missing profile – redirect to complete profile page
          window.location.href = 'complete-profile.html';
        }
      } else {
        // No user: hide profile, show sign-in button
        profileDiv.classList.add('hidden');
        authBtn.classList.remove('hidden');
      }
    });

    // ------------------- ORIGINAL FUNCTIONS (unchanged) -------------------
    function loadLogo() {
      db.ref("site/logo").on("value", snap => {
        const logoUrl = snap.val();
        const logoImg = document.getElementById("site-logo");
        logoImg.src = logoUrl || "https://i.imgur.com/8WN9Od9.png";
      });
    }

    function goHome() {
      document.getElementById("book-detail").classList.add("hidden");
      document.getElementById("books-list").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showBooks() {
      document.getElementById("books-list").classList.remove("hidden");
      document.getElementById("book-detail").classList.add("hidden");
    }

    function goToAuthorPage() { window.location.href = "become-an-author.html"; }
    function showTopNovels() { window.location.href = "top-novels.html"; }

    function loadBooks() {
      db.ref("books").on("value", snap => {
        const list = document.getElementById("books-list");
        list.innerHTML = "";
        snap.forEach(bookSnap => {
          const book = bookSnap.val();
          const div = document.createElement("div");
          div.className = "book-card cursor-pointer text-center";

          const coverImg = book.cover 
            ? `<img src="${book.cover}" alt="${book.title}" class="book-cover mb-2"/>`
            : `<div class='book-cover bg-gray-200 flex items-center justify-center text-gray-400'>No Image</div>`;

          div.innerHTML = `
            ${coverImg}
            <h3 class="text-sm font-bold">${book.title}</h3>
            <p class="text-xs text-gray-600">${book.author || ""}</p>
          `;

          div.onclick = () => window.location.href = `book.html?id=${bookSnap.key}`;

          list.appendChild(div);
        });
      });
    }

    function showBookDetail(id, book) {
      currentBookId = id;
      document.getElementById("books-list").classList.add("hidden");
      document.getElementById("book-detail").classList.remove("hidden");
      document.getElementById("book-title").innerText = book.title;
      document.getElementById("book-desc").innerText = book.description || "";
      const cover = document.getElementById("book-cover");
      if (book.cover) {
        cover.src = book.cover;
        cover.classList.remove("hidden");
      } else {
        cover.classList.add("hidden");
      }
      updateBookmarkIcon();
      loadChapters(id);
      loadComments(id);
      loadAds();

      db.ref("books/" + id).once("value").then(snap => {
        const bookData = snap.val();
        const totalViews = (bookData.views || 0) + 1;
        const weeklyViews = (bookData.weeklyViews || 0) + 1;
        db.ref("books/" + id).update({ views: totalViews, weeklyViews: weeklyViews });
      });
    }

    function toggleAuth() {
      // Replaced by direct redirect to login.html
      window.location.href = 'login.html';
    }

    function toggleBookmark() {
      if (!auth.currentUser || !currentBookId) return;
      const uid = auth.currentUser.uid;
      const ref = db.ref("bookmarks/" + uid);
      if (bookmarks.includes(currentBookId)) bookmarks = bookmarks.filter(b => b !== currentBookId);
      else bookmarks.push(currentBookId);
      ref.set(bookmarks);
      updateBookmarkIcon();
    }

    function loadBookmarks() {
      const uid = auth.currentUser.uid;
      db.ref("bookmarks/" + uid).on("value", snap => {
        bookmarks = snap.val() || [];
        updateBookmarkIcon();
      });
    }

    function updateBookmarkIcon() {
      const icon = document.getElementById("bookmark-icon");
      if (!currentBookId) return;
      icon.className = bookmarks.includes(currentBookId)
        ? "fas fa-bookmark text-purple-600"
        : "far fa-bookmark";
    }

    function postComment() {
      if (!auth.currentUser || !currentBookId) return;
      const text = document.getElementById("comment-input").value.trim();
      if (!text) return;
      const commentRef = db.ref("comments/" + currentBookId).push();
      commentRef.set({
        userId: auth.currentUser.uid,
        userName: auth.currentUser.displayName || "Anonymous",
        text,
        createdAt: Date.now()
      });
      document.getElementById("comment-input").value = "";
    }

    function loadComments(bookId) {
      const list = document.getElementById("comments-list");
      db.ref("comments/" + bookId).on("value", snap => {
        list.innerHTML = "";
        snap.forEach(c => {
          const data = c.val();
          const div = document.createElement("div");
          div.className = "p-2 border rounded";
          div.innerHTML = `<b>${data.userName}</b>: ${data.text}`;
          list.appendChild(div);
        });
      });
    }

    function loadChapters(bookId) {
      const list = document.getElementById("chapters-list");
      db.ref("chapters/" + bookId).on("value", snap => {
        list.innerHTML = "";
        snap.forEach(ch => {
          const data = ch.val();
          const div = document.createElement("div");
          div.className = "p-2 border cursor-pointer hover:bg-gray-100";
          div.innerHTML = `<b>${data.title}</b>`;
          div.onclick = () => {
            window.location.href = `chapter.html?bookId=${bookId}&chapter=${ch.key}`;
          };
          list.appendChild(div);
        });
      });
    }

    function loadAds() {
      const adsDiv = document.getElementById("ads-space");
      db.ref("ads").on("value", snap => {
        adsDiv.innerHTML = "";
        snap.forEach(ad => {
          const data = ad.val();
          const div = document.createElement("div");
          div.className = "border p-2 my-2";
          div.innerHTML = `<a href="${data.link}" target="_blank"><img src="${data.imageUrl}" class="w-full rounded"/></a>`;
          adsDiv.appendChild(div);
        });
      });
    }

    function searchBooks() {
      const query = document.getElementById("search-input").value.toLowerCase();
      const allBooks = document.querySelectorAll("#books-list .book-card");
      allBooks.forEach(card => {
        const title = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = title.includes(query) ? "" : "none";
      });
    }

    // Initialization
    loadLogo();
    loadBooks();

    // Check for book ID in URL
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");

    if (bookId) {
      db.ref("books/" + bookId).once("value").then(snap => {
        if (snap.exists()) {
          showBookDetail(bookId, snap.val());
        } else {
          alert("This book no longer exists.");
        }
      });
    }
  </script>
</body>
</html>
